services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: uuilly-postgres
    # ports:
    #   - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-uuilly}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./postgres_data:/var/lib/postgresql
      - ./backend/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    networks:
      - uuilly-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: uuilly-pgbouncer
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/uuilly_db
    volumes:
      - ./pgbouncer:/etc/pgbouncer
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - uuilly-network
    # ports:
    #   - "6432:6432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
        DIRECT_DATABASE_URL: ${DIRECT_DATABASE_URL}
    container_name: uuilly-backend
    entrypoint: ["/bin/sh", "/app/docker-entrypoint.sh"]
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@pgbouncer:6432/${UUILLY_DB_NAME:-uuilly_db}
      DIRECT_DATABASE_URL: ${DIRECT_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/uuilly_db?schema=public}
      PYTHONPATH: /app
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      PUBLIC_SERVER_URL: ${PUBLIC_SERVER_URL}
      INTERNAL_SERVER_URL: ${INTERNAL_SERVER_URL}
    volumes:
      - ./backend:/app
      - ./tests:/app/tests
    env_file:
      - ./.env
    depends_on:
      pgbouncer:
        condition: service_started
    networks:
      - uuilly-network
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: uuilly-frontend
    env_file:
      - ./.env
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - uuilly-network

  nginx:
    image: nginx:latest
    container_name: uuilly-nginx
    ports:
      - "8080:9090"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - uuilly-network

  flowise:
    image: flowiseai/flowise:latest
    container_name: uuilly-flowise
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MODE=${FLOWISE_MODE:-queue}
      - REMOVE_ON_COUNT=${FLOWISE_REMOVE_ON_COUNT:-100}
      - REMOVE_ON_AGE=${FLOWISE_REMOVE_ON_AGE:-24}
      - REDIS_URL=${FLOWISE_REDIS_URL:-redis://redis:6379}
      - DATABASE_TYPE=postgres
      - DATABASE_HOST=pgbouncer
      - DATABASE_PORT=6432
      - DATABASE_NAME=${FLOWISE_DB_NAME:-flowise_db}
      - DATABASE_USER=${DB_USER:-postgres}
      - DATABASE_PASSWORD=${DB_PASSWORD:-postgres}
      - HTTP_SECURITY_CHECK=${HTTP_SECURITY_CHECK:-false}
      - HTTP_DENY_LIST=${HTTP_DENY_LIST:-}
      - NODE_OPTIONS=--max-old-space-size=1536
      # Flowise Security
      - FLOWISE_SECRETKEY_OVERWRITE=${FLOWISE_SECRETKEY_OVERWRITE}
      - JWT_AUTH_TOKEN_SECRET=${FLOWISE_JWT_AUTH_TOKEN_SECRET}
      - EXPRESS_SESSION_SECRET=${FLOWISE_EXPRESS_SESSION_SECRET}
    volumes:
      - flowise_data:/root/.flowise
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3001/ || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      backend:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - uuilly-network

  flowise-worker:
    image: flowiseai/flowise-worker:latest
    container_name: uuilly-flowise-worker
    environment:
      - PORT=3001
      - WORKER_PORT=5566
      - MODE=${FLOWISE_MODE:-queue}
      - REMOVE_ON_COUNT=${FLOWISE_REMOVE_ON_COUNT:-100}
      - REMOVE_ON_AGE=${FLOWISE_REMOVE_ON_AGE:-24}
      - REDIS_URL=${FLOWISE_REDIS_URL:-redis://redis:6379}
      - DATABASE_TYPE=postgres
      - DATABASE_HOST=pgbouncer
      - DATABASE_PORT=6432
      - DATABASE_NAME=${FLOWISE_DB_NAME:-flowise_db}
      - DATABASE_USER=${DB_USER:-postgres}
      - DATABASE_PASSWORD=${DB_PASSWORD:-postgres}
      - HTTP_SECURITY_CHECK=${HTTP_SECURITY_CHECK:-false}
      - HTTP_DENY_LIST=${HTTP_DENY_LIST:-}
      - NODE_OPTIONS=--max-old-space-size=1536
      # Flowise Security
      - FLOWISE_SECRETKEY_OVERWRITE=${FLOWISE_SECRETKEY_OVERWRITE}
      - JWT_AUTH_TOKEN_SECRET=${FLOWISE_JWT_AUTH_TOKEN_SECRET}
      - EXPRESS_SESSION_SECRET=${FLOWISE_EXPRESS_SESSION_SECRET}
    volumes:
      - flowise_data:/root/.flowise
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5566/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      flowise:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - uuilly-network

  redis:
    image: redis:7-alpine
    container_name: uuilly-redis
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - uuilly-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  uuilly-network:
    driver: bridge

volumes:
  flowise_data:
  redis_data:
