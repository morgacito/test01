# Redis configuration for UUilly
# Disabling RDB persistence (snapshots) for maximum stability in VPS environments.
# Since Redis is used for ephemeral task queues (n8n/Flowise), 
# avoiding forks and disk I/O prevents MISCONF errors and memory pressure.

save ""
stop-writes-on-bgsave-error no

# Memory Hygiene Policies
maxmemory 1024mb
maxmemory-policy noeviction
