[databases]
postgres = host=postgres port=5432 dbname=postgres
uuilly_db = host=postgres port=5432 dbname=uuilly_db
# n8n_db = host=postgres port=5432 dbname=n8n_db pool_mode=session
flowise_db = host=postgres port=5432 dbname=flowise_db

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = trust
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 100
default_pool_size = 20
admin_users = postgres
stats_users = postgres
ignore_startup_parameters = extra_float_digits, statement_timeout, search_path
